<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Oracolo di Gustave Doré</title>
    <style>
        :root { --bg: #0f0f0f; --text: #e0e0e0; --accent: #8b0000; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            display: flex; flex-direction: column; align-items: center; padding: 2vh 5vw;
        }
        h1 { font-style: italic; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-container { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 500px; text-align: center; }
        input, select, button { width: 90%; margin: 10px 0; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; font-family: inherit; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; border: none; }
        button:hover { background: #a50000; }
        button:disabled { background: #444; cursor: not-allowed; }
        .cards-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .card-slot { width: 120px; text-align: center; font-size: 0.9em; }
        .card-slot img { width: 100%; border-radius: 6px; border: 2px solid #555; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #response-area { margin-top: 30px; padding: 20px; background: #111; border-left: 4px solid var(--accent); max-width: 800px; line-height: 1.6; display: none; }
        .loader { display: none; margin-top: 20px; font-style: italic; color: #aaa; }
    </style>
</head>
<body>

    <h1>L'Oracolo di Doré</h1>

    <div class="form-container">
        <input type="text" id="userName" placeholder="Il tuo nome (es. Viandante)" required>
        <input type="number" id="userAge" placeholder="La tua età" required min="18" max="120">
        <select id="cardCount">
            <option value="5">Stesa Breve (5 Carte)</option>
            <option value="10">Grande Croce (10 Carte)</option>
        </select>
        <button id="btn-draw" onclick="consultaOracolo()">Evoca le Carte</button>
        <div id="loader" class="loader">L'Oracolo sta interpretando i simboli... attendi.</div>
    </div>

    <div class="cards-board" id="board"></div>
    <div id="response-area"></div>

<script>
    // 1. IL MAZZO DI CARTE
    // Inserisci qui le tue 78 carte. "file" è il nome esatto della tua immagine, "name" è ciò che legge l'AI.
    const mazzo = [
        { file: "il_bagatto.jpg", name: "Il Bagatto" },
        { file: "la_papessa.jpg", name: "La Papessa" },
        { file: "la_morte.jpg", name: "La Morte" },
        { file: "asso_di_spade.jpg", name: "Asso di Spade" }
        // ... AGGIUNGI LE ALTRE 74 CARTE QUI ...
    ];

    // INSERISCI QUI LA TUA CHIAVE API (Solo per test locale! Vedi spiegazione sotto)
    const OPENAI_API_KEY = "sk-LA-TUA-CHIAVE-API-QUI"; 

    async function consultaOracolo() {
        const name = document.getElementById('userName').value.trim();
        const age = document.getElementById('userAge').value;
        const count = parseInt(document.getElementById('cardCount').value);
        
        if(!name || !age) { alert("Per favore, inserisci nome ed età."); return; }

        // Setup UI
        document.getElementById('btn-draw').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('response-area').style.display = 'none';
        const board = document.getElementById('board');
        board.innerHTML = '';

        // 2. ESTRAZIONE CASUALE (Fisher-Yates Shuffle)
        let shuffled = [...mazzo].sort(() => 0.5 - Math.random());
        let estratte = shuffled.slice(0, count);

        // 3. MOSTRA LE CARTE A SCHERMO
        estratte.forEach(carta => {
            board.innerHTML += `
                <div class="card-slot">
                    <img src="${carta.file}" alt="${carta.name}" onerror="this.src='https://via.placeholder.com/120x200?text=Immagine+Mancante'">
                    <p>${carta.name}</p>
                </div>
            `;
        });

        // 4. PREPARAZIONE DEL PROMPT PER L'AI
        const nomiCarte = estratte.map(c => c.name).join(", ");
        const systemPrompt = `Sei un antico e saggio cartomante. Usa un tono misterioso, profondo, ma incoraggiante, ispirato all'arte gotica di Gustave Doré.
        Stai leggendo le carte per ${name}, che ha ${age} anni. 
        Le carte estratte sono: ${nomiCarte}. 
        Scrivi una lettura coesa, divisa in tre brevi paragrafi (passato, presente e il consiglio dell'oracolo). Non usare elenchi puntati, scrivi in modo discorsivo. Formatta in HTML usando solo tag <p> e <strong>.`;

        // 5. CHIAMATA ALL'API DI OPENAI
        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // Usa gpt-4o-mini per velocità e costi bassi, o gpt-4o per massima qualità
                    messages: [
                        { role: "system", content: "Sei un assistente che restituisce solo codice HTML formattato per la lettura dei tarocchi." },
                        { role: "user", content: systemPrompt }
                    ],
                    temperature: 0.7, // 0.7 dà un buon mix tra logica e creatività
                    max_tokens: 800
                })
            });

            if(!response.ok) throw new Error("Errore API");

            const data = await response.json();
            const letturaHtml = data.choices[0].message.content;

            // Mostra la risposta
            document.getElementById('response-area').innerHTML = letturaHtml;
            document.getElementById('response-area').style.display = 'block';

        } catch (error) {
            console.error("Errore:", error);
            document.getElementById('response-area').innerHTML = "<p><em>I fumi dell'incenso offuscano la visione. L'Oracolo non può rispondere in questo momento. Riprova.</em></p>";
            document.getElementById('response-area').style.display = 'block';
        } finally {
            document.getElementById('btn-draw').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
